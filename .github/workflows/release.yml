name: Release

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin to release'
        required: true
        type: choice
        options:
          - admin-search
          - alt-text
          - astro-payload-richtext-lexical
          - cloudinary
          - content-translator
          - geocoding
          - pages
          - vercel-deployments
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ^9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: cd ${{ inputs.plugin }} && pnpm install --frozen-lockfile

      - name: Bump version
        id: version
        run: |
          cd ${{ inputs.plugin }}
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG="${{ inputs.plugin }}/CHANGELOG.md"
          FIRST_H2=$(grep -m 1 "^## " "$CHANGELOG" | sed 's/^## //')
          if [ "$FIRST_H2" != "$VERSION" ]; then
            echo "::error::CHANGELOG.md first heading is '## ${FIRST_H2}' but expected '## ${VERSION}'. Please update the changelog before releasing."
            exit 1
          fi

      - name: Publish to npm
        run: cd ${{ inputs.plugin }} && pnpm publish --no-git-checks --provenance --access public

      - name: Commit version bump and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.plugin }}/package.json
          git commit -m "release(${{ inputs.plugin }}): v${{ steps.version.outputs.version }}"
          git tag "${{ inputs.plugin }}@${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG="${{ inputs.plugin }}/CHANGELOG.md"
          # Extract the section between the first ## heading and the next ## heading (or EOF)
          BODY=$(awk '/^## /{if(found) exit; found=1; next} found{print}' "$CHANGELOG")
          # Use a delimiter to handle multiline output
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.plugin }}@${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.package_name }}@${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
