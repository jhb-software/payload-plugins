name: Release

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin to release'
        required: true
        type: choice
        options:
          - admin-search
          - alt-text
          - astro-payload-richtext-lexical
          - cloudinary
          - content-translator
          - geocoding
          - pages
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ^9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd ${{ inputs.plugin }} && pnpm install --frozen-lockfile

      - name: Bump version
        id: version
        run: |
          cd ${{ inputs.plugin }}
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG="${{ inputs.plugin }}/CHANGELOG.md"
          if ! grep -q "^## ${VERSION}$" "$CHANGELOG"; then
            echo "::error::CHANGELOG.md is missing a '## ${VERSION}' heading. Please update the changelog before releasing."
            exit 1
          fi

      - name: Publish to npm
        run: cd ${{ inputs.plugin }} && npm publish --provenance --access public

      - name: Commit version bump and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.plugin }}/package.json
          git commit -m "release(${{ inputs.plugin }}): v${{ steps.version.outputs.version }}"
          git tag "${{ inputs.plugin }}@${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.plugin }}@${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.package_name }}@${{ steps.version.outputs.version }}
          generate_release_notes: true
